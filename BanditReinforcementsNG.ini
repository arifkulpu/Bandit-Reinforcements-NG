[Settings]
; Loglama aktif mi (1: Evet, 0: Hayir) / Enable logging (1: Yes, 0: No)
bEnableLogging = 1

[Spawning]
; Oyuncunun seviyesine gore maksimum ek dusman sayisi
; Maximum extra enemies based on player level
iMaxSpawnsLevel1_10 = 3
iMaxSpawnsLevel10_25 = 6
iMaxSpawnsLevel25Plus = 10

; Dusmanlar oyuncudan ne kadar uzakta dogacak (oyun birimi, 1 ok menzili ~ 2000)
; Patrol spawn distance from player (game units, ~2000 = one bow range)
fPatrolSpawnDistance = 2000.0

[Boss]
; Boss dogma sansi (0-100 arasi yuzde) / Boss spawn chance (0-100 percent)
iBossSpawnChance = 15

; Boss dogmasi icin minimum oyuncu seviyesi / Minimum player level for boss spawns
iBossMinPlayerLevel = 10

[Ambush]
; Pusu (zindan cikisi) dogma sansi (0-100 arasi yuzde) / Ambush chance on dungeon exit (0-100)
iAmbushChance = 30

; Pusu grubundaki minimum ve maksimum dusman sayisi
; Min and max enemies in an ambush group
iAmbushMinCount = 2
iAmbushMaxCount = 5

[Cooldown]
; Temizlenmis (Cleared) bolgeler icin tekrar dogma suresi (oyun ici gun)
; Cooldown for fully cleared locations (in-game days)
fClearedCooldownDays = 10.0

; Sadece girilip cikilan (kacilan) bolgeler icin bekleme suresi (oyun ici gun)
; Cooldown for locations the player fled from (in-game days)
fVisitedCooldownDays = 3.0

[Factions]
; Hangi fraksiyonlar aktif? (1: Aktif, 0: Pasif) / Which factions are enabled?
bEnableBandits = 1
bEnableVampires = 1
bEnableWarlocks = 1
bEnableForsworn = 1
bEnableDraugr = 1
